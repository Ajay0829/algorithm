# PostgreSQL datasource configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/my_database_1
spring.datasource.username=testuser
spring.datasource.password=testpass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=3


spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.fetch-max-bytes=52428800
spring.kafka.consumer.max-partition-fetch-bytes=10485760
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=500


spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.retries= 3
spring.kafka.producer.batch-size=32768
spring.kafka.producer.linger-ms=10
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.acks=all
spring.kafka.producer.partition-count=20

spring.kafka.listener.concurrency=20
spring.kafka.listener.type=batch
spring.kafka.listener.ack-mode=manual


candle.kafka.consumer.group-id= feature-extractor-group

swing.threshold.multiplier=3
impulse.threshold.multiplier=3
bos.threshold.multiplier=2
server.port=8081

